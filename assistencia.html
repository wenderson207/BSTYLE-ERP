<style>
  .kanban{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
  .kanban-col{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:12px; padding:12px; }
  .kanban-col h4{ font-size:11px; text-transform:uppercase; color:var(--text-tertiary); font-family:var(--font-mono); margin:0 0 10px; }
  .kanban-card{ background:var(--bg-elevated); border:1px solid var(--hairline); border-radius:9px; padding:10px 12px; margin-bottom:8px; font-size:12px; cursor:pointer; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input, .ffield select, .ffield textarea{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
  .senha-tabs{ display:flex; gap:8px; margin-bottom:14px; }
  .senha-tabs button{ flex:1; padding:8px; border-radius:8px; border:1px solid var(--hairline); background:var(--bg-elevated); color:var(--text-secondary); cursor:pointer; }
  .senha-tabs button.active{ border-color:var(--mint); color:var(--mint); }
  .pattern-grid{ display:grid; grid-template-columns:repeat(3,44px); grid-template-rows:repeat(3,44px); gap:18px; margin:10px auto; width:fit-content; }
  .pattern-dot{ width:44px; height:44px; border-radius:50%; border:2px solid var(--hairline); background:var(--bg-elevated); cursor:pointer; position:relative; }
  .pattern-dot.active{ border-color:var(--mint); background:rgba(47,225,168,0.15); }
  .pattern-dot.active::after{ content:''; position:absolute; inset:17px; border-radius:50%; background:var(--mint); }
</style>

<div class="toolbar">
  <div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Assistência técnica</h1></div>
  <button class="btn btn-primary" id="btnNovaOS">+ Nova OS</button>
</div>

<div class="kanban" id="kanban"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 style="font-family:var(--font-display); margin:0;">Nova Ordem de Serviço</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <div class="frow2">
        <div class="ffield"><label>Cliente</label><select id="fCliente"><option value="">Selecione…</option></select></div>
        <div class="ffield"><label>Prazo</label><input id="fPrazo" type="date"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Marca</label><input id="fMarca"></div>
        <div class="ffield"><label>Modelo</label><input id="fModelo"></div>
      </div>
      <div class="ffield"><label>Defeito informado *</label><textarea id="fDefeito"></textarea></div>
      <div class="ffield">
        <label>Desbloqueio do aparelho</label>
        <div class="senha-tabs">
          <button type="button" class="active" data-tipo="PIN">PIN</button>
          <button type="button" data-tipo="TEXTO">Senha texto</button>
          <button type="button" data-tipo="PADRAO">Padrão</button>
        </div>
        <div id="senhaPinWrap"><input id="fSenhaPin" placeholder="Ex.: 1234"></div>
        <div id="senhaTextoWrap" style="display:none;"><input id="fSenhaTexto"></div>
        <div id="senhaPadraoWrap" style="display:none; text-align:center;">
          <div class="pattern-grid" id="patternGrid"></div>
          <div style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);" id="patternSeq">—</div>
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" id="btnCancelar">Cancelar</button><button class="btn btn-primary" id="btnSalvar">Abrir OS</button></div>
  </div>
</div>

<script>
(async function(){
  const STATUS_COLUNAS = ['Aberta','Em diagnóstico','Aguardando peça','Em reparo','Pronto','Entregue'];
  let ordens = [], clientes = [], senhaTipoAtual = 'PIN', sequenciaPadrao = [];

  async function carregar(){
    try {
      if (!(await checarPermissao('ASSISTENCIA','VISUALIZAR'))){ document.getElementById('kanban').innerHTML='Sem permissão.'; return; }
      clientes = await dbGetAll('CLIENTES');
      ordens = await dbGetAll('ASSISTENCIAS');
      document.getElementById('fCliente').innerHTML = '<option value="">Selecione…</option>' + clientes.map(c => `<option value="${c.ID}">${c.NOME}</option>`).join('');
      renderKanban();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }

  function renderKanban(){
    document.getElementById('kanban').innerHTML = STATUS_COLUNAS.map(status => {
      const doStatus = ordens.filter(o => o.STATUS === status);
      return `<div class="kanban-col"><h4>${status} (${doStatus.length})</h4>${
        doStatus.map(o => `<div class="kanban-card" onclick="window.__mudarStatus('${o.ID}','${o.STATUS}')"><div style="color:var(--mint); font-family:var(--font-mono); font-size:11px;">${o.NUMERO_OS}</div><b>${o.MARCA} ${o.MODELO}</b><div style="color:var(--text-tertiary);">${o.DEFEITO_INFORMADO}</div></div>`).join('')
        || '<div style="color:var(--text-tertiary); font-size:11.5px;">Nenhuma OS.</div>'}</div>`;
    }).join('');
  }

  window.__mudarStatus = async (id, statusAtual) => {
    const novo = prompt('Novo status (' + STATUS_COLUNAS.join(' / ') + '):', statusAtual);
    if (!novo || novo === statusAtual || !STATUS_COLUNAS.includes(novo)) return;
    try {
      if (!(await checarPermissao('ASSISTENCIA','EDITAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      await dbUpdate('ASSISTENCIAS', id, { STATUS: novo });
      mostrarToast('Status atualizado.'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  };

  // ---------- grade 3x3 ----------
  const grid = document.getElementById('patternGrid');
  for (let i=1;i<=9;i++){
    const dot = document.createElement('div'); dot.className='pattern-dot';
    dot.addEventListener('click', () => {
      if (sequenciaPadrao.includes(i)) return;
      sequenciaPadrao.push(i); dot.classList.add('active');
      document.getElementById('patternSeq').textContent = sequenciaPadrao.join(' → ');
    });
    grid.appendChild(dot);
  }
  document.querySelectorAll('.senha-tabs button').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.senha-tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); senhaTipoAtual = btn.dataset.tipo;
    document.getElementById('senhaPinWrap').style.display = senhaTipoAtual==='PIN'?'block':'none';
    document.getElementById('senhaTextoWrap').style.display = senhaTipoAtual==='TEXTO'?'block':'none';
    document.getElementById('senhaPadraoWrap').style.display = senhaTipoAtual==='PADRAO'?'block':'none';
  }));

  const modal = document.getElementById('modal');
  document.getElementById('btnNovaOS').addEventListener('click', () => modal.classList.add('open'));
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const cliente = document.getElementById('fCliente').value;
    const defeito = document.getElementById('fDefeito').value.trim();
    if (!cliente || !defeito){ mostrarToast('Cliente e defeito são obrigatórios.', 'erro'); return; }

    let senhaValor = senhaTipoAtual==='PIN' ? document.getElementById('fSenhaPin').value.trim()
      : senhaTipoAtual==='TEXTO' ? document.getElementById('fSenhaTexto').value.trim()
      : sequenciaPadrao.join(',');

    try {
      if (!(await checarPermissao('ASSISTENCIA','CADASTRAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      const ano = new Date().getFullYear();
      const totalAno = ordens.filter(o => String(o.NUMERO_OS).startsWith('OS-'+ano)).length;
      const numeroOS = 'OS-' + ano + '-' + String(totalAno+1).padStart(5,'0');

      await dbInsert('ASSISTENCIAS', {
        NUMERO_OS: numeroOS, CLIENTE_ID: cliente, MARCA: document.getElementById('fMarca').value.trim(),
        MODELO: document.getElementById('fModelo').value.trim(), DEFEITO_INFORMADO: defeito,
        SENHA_TIPO: senhaTipoAtual, SENHA_VALOR: senhaValor, PRAZO: document.getElementById('fPrazo').value,
        STATUS: 'Aberta', DATA_ABERTURA: new Date().toISOString()
      });
      mostrarToast('OS ' + numeroOS + ' aberta.');
      modal.classList.remove('open'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  carregar();
})();
</script>
