<style>
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:480px; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
</style>

<div class="toolbar">
  <div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Fornecedores</h1></div>
  <button class="btn btn-primary" id="btnNovo">+ Novo fornecedor</button>
</div>

<table class="dt">
  <thead><tr><th>Nome</th><th>CNPJ/CPF</th><th>Telefone</th><th>Email</th><th></th></tr></thead>
  <tbody id="linhas"><tr class="empty-row"><td colspan="5">Carregando…</td></tr></tbody>
</table>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitulo" style="font-family:var(--font-display); margin:0;">Novo fornecedor</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="fId">
      <div class="ffield"><label>Nome *</label><input id="fNome"></div>
      <div class="frow2">
        <div class="ffield"><label>CNPJ/CPF</label><input id="fDoc"></div>
        <div class="ffield"><label>Telefone</label><input id="fTelefone"></div>
      </div>
      <div class="ffield"><label>Email</label><input id="fEmail"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Salvar fornecedor</button>
    </div>
  </div>
</div>

<script>
(async function(){
  let itens = [];

  function renderLinhas(lista){
    const tbody = document.getElementById('linhas');
    if (!lista.length){ tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum fornecedor cadastrado.</td></tr>'; return; }
    tbody.innerHTML = lista.map(f => `<tr>
      <td><b>${f.NOME}</b></td><td class="mono">${f.CNPJ_CPF||'—'}</td><td class="mono">${f.TELEFONE||'—'}</td><td>${f.EMAIL||'—'}</td>
      <td style="display:flex; gap:6px;">
        <button class="btn" style="padding:6px 10px; font-size:11.5px;" onclick="window.__editar('${f.ID}')">Editar</button>
        <button class="btn" style="padding:6px 10px; font-size:11.5px; color:var(--red);" onclick="window.__excluir('${f.ID}')">Excluir</button>
      </td></tr>`).join('');
  }

  async function carregar(){
    try {
      if (!(await checarPermissao('FORNECEDORES','VISUALIZAR'))){ document.getElementById('linhas').innerHTML='<tr class="empty-row"><td colspan="5">Sem permissão.</td></tr>'; return; }
      itens = (await dbGetAll('FORNECEDORES')).filter(f => f.STATUS !== 'Excluído');
      renderLinhas(itens);
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }

  const modal = document.getElementById('modal');
  function abrirModal(f){
    document.getElementById('modalTitulo').textContent = f ? 'Editar fornecedor' : 'Novo fornecedor';
    document.getElementById('fId').value = f ? f.ID : '';
    document.getElementById('fNome').value = f ? f.NOME : '';
    document.getElementById('fDoc').value = f ? f.CNPJ_CPF||'' : '';
    document.getElementById('fTelefone').value = f ? f.TELEFONE||'' : '';
    document.getElementById('fEmail').value = f ? f.EMAIL||'' : '';
    modal.classList.add('open');
  }
  document.getElementById('btnNovo').addEventListener('click', () => abrirModal(null));
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const id = document.getElementById('fId').value;
    const nome = document.getElementById('fNome').value.trim();
    if (!nome){ mostrarToast('Informe o nome.', 'erro'); return; }
    const dados = { NOME: nome, CNPJ_CPF: document.getElementById('fDoc').value.trim(), TELEFONE: document.getElementById('fTelefone').value.trim(), EMAIL: document.getElementById('fEmail').value.trim() };
    try {
      if (id) {
        if (!(await checarPermissao('FORNECEDORES','EDITAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
        await dbUpdate('FORNECEDORES', id, dados); mostrarToast('Fornecedor atualizado.');
      } else {
        if (!(await checarPermissao('FORNECEDORES','CADASTRAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
        await dbInsert('FORNECEDORES', Object.assign({ STATUS:'Ativo' }, dados)); mostrarToast('Fornecedor cadastrado.');
      }
      modal.classList.remove('open'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  window.__editar = (id) => { const f = itens.find(x => x.ID === id); if (f) abrirModal(f); };
  window.__excluir = async (id) => {
    if (!confirm('Excluir este fornecedor?')) return;
    try {
      if (!(await checarPermissao('FORNECEDORES','EXCLUIR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      await dbExcluirLogico('FORNECEDORES', id); mostrarToast('Fornecedor excluído.'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  };

  carregar();
})();
</script>
