<style>
  .notif-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:20px; }
  .notif-card{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:12px; padding:16px 18px; }
  .notif-card.urgente{ border-color:rgba(255,92,92,0.4); background:rgba(255,92,92,0.05); }
  .notif-card.atencao{ border-color:rgba(245,166,35,0.4); background:rgba(245,166,35,0.05); }
  .notif-card .num{ font-family:var(--font-display); font-size:26px; font-weight:700; }
  .notif-card .lbl{ font-size:12px; color:var(--text-secondary); margin-top:4px; }

  .agenda-lista{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:12px; overflow:hidden; }
  .agenda-item{ display:flex; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--hairline); }
  .agenda-item:last-child{ border-bottom:none; }
  .agenda-item .data-badge{ min-width:56px; text-align:center; background:var(--bg-elevated); border-radius:8px; padding:6px 8px; font-family:var(--font-mono); }
  .agenda-item .data-badge .dia{ font-size:16px; font-weight:700; color:var(--mint); }
  .agenda-item .data-badge .mes{ font-size:9.5px; color:var(--text-tertiary); text-transform:uppercase; }
  .agenda-item.atrasado .data-badge .dia{ color:var(--red); }
  .agenda-item .info{ flex:1; }
  .agenda-item .info .num-os{ font-family:var(--font-mono); color:var(--blue); font-size:11.5px; }
</style>

<div class="toolbar"><div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Agenda</h1>
<p style="color:var(--text-secondary); font-size:13px; margin:0;">Aparelhos com entrega planejada — organizados por urgência.</p></div></div>

<div class="notif-grid" id="notifGrid"></div>

<div class="agenda-lista" id="agendaLista"></div>

<script>
(async function(){
  function nomeCliente(id, clientes){ const c = clientes.find(x=>x.ID===id); return c?c.NOME:'—'; }

  try {
    if (!(await checarPermissao('ASSISTENCIA','VISUALIZAR'))){ setHTML('agendaLista', 'Sem permissão.'); return; }

    const [ordens, clientes] = await Promise.all([dbGetAll('ASSISTENCIAS'), dbGetAll('CLIENTES')]);
    const pendentes = ordens.filter(o => o.STATUS !== 'Entregue' && o.PRAZO);

    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const atrasados = pendentes.filter(o => new Date(o.PRAZO) < hoje);
    const hojeEntrega = pendentes.filter(o => new Date(o.PRAZO).toDateString() === new Date().toDateString());
    const amanha = new Date(hoje); amanha.setDate(amanha.getDate()+1);
    const proximos7 = pendentes.filter(o => { const p = new Date(o.PRAZO); return p >= amanha && p <= new Date(hoje.getTime()+7*86400000); });

    setHTML('notifGrid', `
      <div class="notif-card urgente"><div class="num">${atrasados.length}</div><div class="lbl">Atrasados — já deveriam ter sido entregues</div></div>
      <div class="notif-card atencao"><div class="num">${hojeEntrega.length}</div><div class="lbl">Pra entregar hoje</div></div>
      <div class="notif-card"><div class="num">${proximos7.length}</div><div class="lbl">Nos próximos 7 dias</div></div>
      <div class="notif-card"><div class="num">${pendentes.length}</div><div class="lbl">Total de aparelhos em aberto com prazo</div></div>
    `);

    const ordenados = pendentes.slice().sort((a,b) => new Date(a.PRAZO) - new Date(b.PRAZO));

    setHTML('agendaLista', ordenados.length ? ordenados.map(o => {
      const dataEntrega = new Date(o.PRAZO);
      const atrasado = dataEntrega < hoje;
      return `<div class="agenda-item ${atrasado?'atrasado':''}">
        <div class="data-badge"><div class="dia">${String(dataEntrega.getDate()).padStart(2,'0')}</div><div class="mes">${dataEntrega.toLocaleDateString('pt-BR',{month:'short'})}</div></div>
        <div class="info">
          <div class="num-os">${o.NUMERO_OS}</div>
          <div><b>${nomeCliente(o.CLIENTE_ID, clientes)}</b> — ${o.MARCA||''} ${o.MODELO||''}</div>
          <div style="color:var(--text-tertiary); font-size:11.5px;">${o.DEFEITO_INFORMADO||''}</div>
        </div>
        <span class="badge ${atrasado?'danger':'info'}" style="display:inline-flex; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-mono); background:${atrasado?'rgba(255,92,92,0.12)':'rgba(76,141,255,0.12)'}; color:${atrasado?'#FF5C5C':'#4C8DFF'};">${o.STATUS}</span>
      </div>`;
    }).join('') : '<div style="padding:40px; text-align:center; color:var(--text-tertiary);">Nenhum aparelho com entrega planejada.</div>');

  } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
})();
</script>
