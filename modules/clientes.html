<style>
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
</style>

<div class="toolbar">
  <div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Clientes</h1>
  <p style="color:var(--text-secondary); font-size:13px; margin:0;">Cadastro e busca de clientes.</p></div>
  <button class="btn btn-primary" id="btnNovo">+ Novo cliente</button>
</div>

<div style="margin-bottom:14px;">
  <input id="busca" placeholder="Buscar por nome, CPF, telefone…" style="width:100%; max-width:340px; background:var(--bg-surface); border:1px solid var(--hairline); color:var(--text-primary); padding:9px 12px; border-radius:8px; font-size:12.5px;">
</div>

<table class="dt">
  <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Valor gasto</th><th></th></tr></thead>
  <tbody id="linhas"><tr class="empty-row"><td colspan="5">Carregando…</td></tr></tbody>
</table>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitulo" style="font-family:var(--font-display); margin:0;">Novo cliente</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="fId">
      <div class="ffield"><label>Nome completo *</label><input id="fNome"></div>
      <div class="frow2">
        <div class="ffield"><label>CPF</label><input id="fCpf"></div>
        <div class="ffield"><label>Telefone / WhatsApp</label><input id="fTelefone"></div>
      </div>
      <div class="ffield"><label>Email</label><input id="fEmail"></div>
      <div class="frow2">
        <div class="ffield"><label>Rua</label><input id="fRua"></div>
        <div class="ffield"><label>Número</label><input id="fNumero"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Bairro</label><input id="fBairro"></div>
        <div class="ffield"><label>CEP</label><input id="fCep"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Cidade</label><input id="fCidade"></div>
        <div class="ffield"><label>Estado</label><input id="fEstado" maxlength="2"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Salvar cliente</button>
    </div>
  </div>
</div>

<script>
(async function(){
  let clientes = [];

  function moeda(v){ return (Number(v)||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }

  function renderLinhas(lista){
    const tbody = document.getElementById('linhas');
    if (!lista.length){ tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum cliente encontrado.</td></tr>'; return; }
    tbody.innerHTML = lista.map(c => `<tr>
      <td><b>${c.NOME}</b></td><td class="mono">${c.CPF||'—'}</td><td class="mono">${c.TELEFONE||'—'}</td><td>${moeda(c.VALOR_GASTO_TOTAL)}</td>
      <td style="display:flex; gap:6px;">
        <button class="btn" style="padding:6px 10px; font-size:11.5px;" onclick="window.__editarCliente('${c.ID}')">Editar</button>
        <button class="btn" style="padding:6px 10px; font-size:11.5px; color:var(--red);" onclick="window.__excluirCliente('${c.ID}')">Excluir</button>
      </td></tr>`).join('');
  }

  async function carregar(){
    try {
      const podeVer = await checarPermissao('CLIENTES', 'VISUALIZAR');
      if (!podeVer) { setHTML('linhas', '<tr class="empty-row"><td colspan="5">Sem permissão para ver clientes.</td></tr>'); return; }
      clientes = (await dbGetAll('CLIENTES')).filter(c => c.STATUS !== 'Excluído');
      renderLinhas(clientes);
    } catch (e) {
      mostrarToast('Erro ao carregar clientes: ' + e.message, 'erro');
    }
  }

  document.getElementById('busca').addEventListener('input', e => {
    const t = e.target.value.toLowerCase();
    renderLinhas(clientes.filter(c => (c.NOME||'').toLowerCase().includes(t) || (c.CPF||'').includes(t) || (c.TELEFONE||'').includes(t)));
  });

  const modal = document.getElementById('modal');
  function abrirModal(c){
    document.getElementById('modalTitulo').textContent = c ? 'Editar cliente' : 'Novo cliente';
    document.getElementById('fId').value = c ? c.ID : '';
    document.getElementById('fNome').value = c ? c.NOME : '';
    document.getElementById('fCpf').value = c ? c.CPF||'' : '';
    document.getElementById('fTelefone').value = c ? c.TELEFONE||'' : '';
    document.getElementById('fEmail').value = c ? c.EMAIL||'' : '';
    document.getElementById('fRua').value = c ? c.RUA||'' : '';
    document.getElementById('fNumero').value = c ? c.NUMERO||'' : '';
    document.getElementById('fBairro').value = c ? c.BAIRRO||'' : '';
    document.getElementById('fCep').value = c ? c.CEP||'' : '';
    document.getElementById('fCidade').value = c ? c.CIDADE||'' : '';
    document.getElementById('fEstado').value = c ? c.ESTADO||'' : '';
    modal.classList.add('open');
  }
  document.getElementById('btnNovo').addEventListener('click', () => abrirModal(null));
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const id = document.getElementById('fId').value;
    const nome = document.getElementById('fNome').value.trim();
    if (!nome){ mostrarToast('Informe o nome do cliente.', 'erro'); return; }

    const dados = {
      NOME: nome, CPF: document.getElementById('fCpf').value.trim(),
      TELEFONE: document.getElementById('fTelefone').value.trim(), EMAIL: document.getElementById('fEmail').value.trim(),
      RUA: document.getElementById('fRua').value.trim(), NUMERO: document.getElementById('fNumero').value.trim(),
      BAIRRO: document.getElementById('fBairro').value.trim(), CEP: document.getElementById('fCep').value.trim(),
      CIDADE: document.getElementById('fCidade').value.trim(), ESTADO: document.getElementById('fEstado').value.trim()
    };

    try {
      if (id) {
        const podeEditar = await checarPermissao('CLIENTES', 'EDITAR');
        if (!podeEditar){ mostrarToast('Sem permissão para editar.', 'erro'); return; }
        await dbUpdate('CLIENTES', id, dados);
        mostrarToast('Cliente atualizado.');
      } else {
        const podeCadastrar = await checarPermissao('CLIENTES', 'CADASTRAR');
        if (!podeCadastrar){ mostrarToast('Sem permissão para cadastrar.', 'erro'); return; }
        await dbInsert('CLIENTES', Object.assign({ VALOR_GASTO_TOTAL: 0, STATUS: 'Ativo', DATA_CRIACAO: new Date().toISOString() }, dados));
        mostrarToast('Cliente cadastrado.');
      }
      modal.classList.remove('open');
      carregar();
    } catch (e) {
      mostrarToast('Erro: ' + e.message, 'erro');
    }
  });

  window.__editarCliente = (id) => { const c = clientes.find(x => x.ID === id); if (c) abrirModal(c); };
  window.__excluirCliente = async (id) => {
    if (!confirm('Excluir este cliente?')) return;
    try {
      const podeExcluir = await checarPermissao('CLIENTES', 'EXCLUIR');
      if (!podeExcluir){ mostrarToast('Sem permissão para excluir.', 'erro'); return; }
      await dbExcluirLogico('CLIENTES', id);
      mostrarToast('Cliente excluído.');
      carregar();
    } catch (e) {
      mostrarToast('Erro: ' + e.message, 'erro');
    }
  };

  carregar();
})();
</script>
