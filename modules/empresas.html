<style>
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
</style>

<div class="toolbar">
  <div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Empresas</h1>
  <p style="color:var(--text-secondary); font-size:13px; margin:0;">Gestão multiempresa.</p></div>
  <button class="btn btn-primary" id="btnNovo">+ Nova empresa</button>
</div>

<table class="dt">
  <thead><tr><th>Nome</th><th>CNPJ</th><th>Cidade/UF</th><th>WhatsApp</th><th></th></tr></thead>
  <tbody id="linhas"><tr class="empty-row"><td colspan="5">Carregando…</td></tr></tbody>
</table>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitulo" style="font-family:var(--font-display); margin:0;">Nova empresa</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="fId">
      <div class="ffield"><label>Nome *</label><input id="fNome"></div>
      <div class="frow2">
        <div class="ffield"><label>CNPJ</label><input id="fCnpj"></div>
        <div class="ffield"><label>WhatsApp</label><input id="fWhatsapp"></div>
      </div>
      <div class="ffield"><label>Email de contato</label><input id="fEmail" placeholder="contato@sualoja.com"></div>
      <div class="frow2">
        <div class="ffield"><label>Rua</label><input id="fRua"></div>
        <div class="ffield"><label>Número</label><input id="fNumero"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Bairro</label><input id="fBairro"></div>
        <div class="ffield"><label>CEP</label><input id="fCep"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Cidade</label><input id="fCidade"></div>
        <div class="ffield"><label>Estado</label><input id="fEstado" maxlength="2"></div>
      </div>
      <div class="ffield"><label>PIX</label><input id="fPix"></div>
      <div class="ffield"><label>Garantia padrão (dias)</label><input id="fGarantia" type="number" value="90"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Salvar empresa</button>
    </div>
  </div>
</div>

<script>
(async function(){
  let itens = [];

  function renderLinhas(lista){
    const tbody = document.getElementById('linhas');
    if (!lista.length){ tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhuma empresa cadastrada.</td></tr>'; return; }
    tbody.innerHTML = lista.map(e => `<tr>
      <td><b>${e.NOME}</b></td><td class="mono">${e.CNPJ||'—'}</td><td>${e.CIDADE||'—'}${e.ESTADO?'/'+e.ESTADO:''}</td><td class="mono">${e.WHATSAPP||'—'}</td>
      <td style="display:flex; gap:6px;">
        <button class="btn" style="padding:6px 10px; font-size:11.5px;" onclick="window.__editar('${e.ID}')">Editar</button>
        <button class="btn" style="padding:6px 10px; font-size:11.5px; color:var(--red);" onclick="window.__excluir('${e.ID}')">Excluir</button>
      </td></tr>`).join('');
  }

  async function carregar(){
    try {
      if (!(await checarPermissao('EMPRESAS','VISUALIZAR'))){ setHTML('linhas', '<tr class="empty-row"><td colspan="5">Sem permissão.</td></tr>'); return; }
      itens = (await dbGetAll('EMPRESAS')).filter(e => e.STATUS !== 'Excluído');
      renderLinhas(itens);
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }

  const modal = document.getElementById('modal');
  function abrirModal(e){
    document.getElementById('modalTitulo').textContent = e ? 'Editar empresa' : 'Nova empresa';
    document.getElementById('fId').value = e ? e.ID : '';
    document.getElementById('fNome').value = e ? e.NOME : '';
    document.getElementById('fCnpj').value = e ? e.CNPJ||'' : '';
    document.getElementById('fWhatsapp').value = e ? e.WHATSAPP||'' : '';
    document.getElementById('fEmail').value = e ? e.EMAIL||'' : '';
    document.getElementById('fRua').value = e ? e.RUA||'' : '';
    document.getElementById('fNumero').value = e ? e.NUMERO||'' : '';
    document.getElementById('fBairro').value = e ? e.BAIRRO||'' : '';
    document.getElementById('fCep').value = e ? e.CEP||'' : '';
    document.getElementById('fCidade').value = e ? e.CIDADE||'' : '';
    document.getElementById('fEstado').value = e ? e.ESTADO||'' : '';
    document.getElementById('fPix').value = e ? e.PIX||'' : '';
    document.getElementById('fGarantia').value = e ? e.GARANTIA_PADRAO_DIAS : 90;
    modal.classList.add('open');
  }
  document.getElementById('btnNovo').addEventListener('click', () => abrirModal(null));
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const id = document.getElementById('fId').value;
    const nome = document.getElementById('fNome').value.trim();
    if (!nome){ mostrarToast('Informe o nome da empresa.', 'erro'); return; }
    const dados = {
      NOME: nome, CNPJ: document.getElementById('fCnpj').value.trim(), WHATSAPP: document.getElementById('fWhatsapp').value.trim(),
      EMAIL: document.getElementById('fEmail').value.trim(),
      RUA: document.getElementById('fRua').value.trim(), NUMERO: document.getElementById('fNumero').value.trim(),
      BAIRRO: document.getElementById('fBairro').value.trim(), CEP: document.getElementById('fCep').value.trim(),
      CIDADE: document.getElementById('fCidade').value.trim(), ESTADO: document.getElementById('fEstado').value.trim(),
      PIX: document.getElementById('fPix').value.trim(), GARANTIA_PADRAO_DIAS: Number(document.getElementById('fGarantia').value)||90
    };
    try {
      if (id) {
        if (!(await checarPermissao('EMPRESAS','EDITAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
        await dbUpdate('EMPRESAS', id, dados); mostrarToast('Empresa atualizada.');
      } else {
        if (!(await checarPermissao('EMPRESAS','CADASTRAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
        await dbInsert('EMPRESAS', Object.assign({ STATUS:'Ativo', DATA_CRIACAO: new Date().toISOString() }, dados)); mostrarToast('Empresa cadastrada.');
      }
      modal.classList.remove('open'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  window.__editar = (id) => { const e = itens.find(x => x.ID === id); if (e) abrirModal(e); };
  window.__excluir = async (id) => {
    if (!confirm('Excluir esta empresa?')) return;
    try {
      if (!(await checarPermissao('EMPRESAS','EXCLUIR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      await dbExcluirLogico('EMPRESAS', id); mostrarToast('Empresa excluída.'); carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  };

  carregar();
})();
</script>
