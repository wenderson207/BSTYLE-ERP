<style>
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input, .ffield select{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
  .badge{ display:inline-flex; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-mono); }
  .badge.ok{ background:rgba(47,225,168,0.12); color:var(--mint); }
  .badge.neutral{ background:var(--bg-elevated); color:var(--text-secondary); }
  .badge.info{ background:rgba(76,141,255,0.12); color:var(--blue); }
</style>

<div class="toolbar">
  <div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Funcionários</h1></div>
  <button class="btn btn-primary" id="btnNovo">+ Novo funcionário</button>
</div>

<table class="dt">
  <thead><tr><th>Nome</th><th>Cargo</th><th>Loja</th><th>Perfil</th><th>Status</th><th></th></tr></thead>
  <tbody id="linhas"><tr class="empty-row"><td colspan="6">Carregando…</td></tr></tbody>
</table>

<!-- Modal: novo funcionário -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 style="font-family:var(--font-display); margin:0;">Novo funcionário</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <div class="frow2">
        <div class="ffield"><label>Nome *</label><input id="fNome"></div>
        <div class="ffield"><label>Email *</label><input id="fEmail" type="email"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Cargo</label><input id="fCargo"></div>
        <div class="ffield"><label>Telefone</label><input id="fTelefone"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Perfil de acesso *</label><select id="fPerfil"><option value="">Selecione…</option></select></div>
        <div class="ffield"><label>Loja</label><select id="fEmpresa"><option value="">Todas as lojas</option></select></div>
      </div>
      <div class="ffield"><label>Senha inicial *</label><input id="fSenha" type="text" placeholder="Mínimo 6 caracteres"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Criar funcionário</button>
    </div>
  </div>
</div>

<!-- Modal: editar funcionário -->
<div class="modal-overlay" id="modalEditar">
  <div class="modal-box">
    <div class="modal-head"><h3 style="font-family:var(--font-display); margin:0;">Editar funcionário</h3><button class="modal-close" id="fecharModalEditar">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="eId">
      <div class="frow2">
        <div class="ffield"><label>Nome</label><input id="eNome"></div>
        <div class="ffield"><label>Cargo</label><input id="eCargo"></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Telefone</label><input id="eTelefone"></div>
        <div class="ffield"><label>Status</label><select id="eStatus"><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option></select></div>
      </div>
      <div class="frow2">
        <div class="ffield"><label>Perfil de acesso</label><select id="ePerfil"></select></div>
        <div class="ffield"><label>Loja</label><select id="eEmpresa"><option value="">Todas as lojas</option></select></div>
      </div>
      <p style="color:var(--text-tertiary); font-size:11.5px;">Email e senha não podem ser trocados aqui — o funcionário usa "Esqueci minha senha" na tela de login se precisar redefinir.</p>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelarEditar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarEditar">Salvar alterações</button>
    </div>
  </div>
</div>

<script>
(async function(){
  let itens = [], perfis = [], empresas = [];

  function nomePerfil(id){ const p = perfis.find(x=>x.ID===id); return p?p.NOME:'—'; }
  function nomeEmpresa(id){ if (!id) return 'Todas'; const e = empresas.find(x=>x.ID===id); return e?e.NOME:'—'; }

  function renderLinhas(lista){
    if (!lista.length){ setHTML('linhas', '<tr class="empty-row"><td colspan="6">Nenhum funcionário cadastrado.</td></tr>'); return; }
    setHTML('linhas', lista.map(f => `<tr>
      <td><b>${f.NOME}</b></td><td>${f.CARGO||'—'}</td>
      <td><span class="badge ${f.EMPRESA_ID?'info':'neutral'}">${nomeEmpresa(f.EMPRESA_ID)}</span></td>
      <td>${nomePerfil(f.PERFIL_ID)}</td>
      <td><span class="badge ${f.STATUS==='Ativo'?'ok':'neutral'}">${f.STATUS}</span></td>
      <td style="display:flex; gap:6px;">
        <button class="btn" style="padding:6px 10px; font-size:11.5px;" onclick="window.__editar('${f.ID}')">Editar</button>
      </td></tr>`).join(''));
  }

  async function carregar(){
    try {
      if (!(await checarPermissao('FUNCIONARIOS','VISUALIZAR'))){ setHTML('linhas', '<tr class="empty-row"><td colspan="6">Sem permissão.</td></tr>'); return; }
      perfis = await dbGetAll('PERFIS');
      empresas = await dbGetAll('EMPRESAS');
      itens = await dbGetAll('USUARIOS');
      renderLinhas(itens);

      const opcoesPerfil = '<option value="">Selecione…</option>' + perfis.map(p => `<option value="${p.ID}">${p.NOME}</option>`).join('');
      const opcoesEmpresa = '<option value="">Todas as lojas</option>' + empresas.map(e => `<option value="${e.ID}">${e.NOME}</option>`).join('');
      setHTML('fPerfil', opcoesPerfil);
      setHTML('fEmpresa', opcoesEmpresa);
      setHTML('ePerfil', opcoesPerfil);
      setHTML('eEmpresa', opcoesEmpresa);
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }

  // ---------- Novo ----------
  const modal = document.getElementById('modal');
  document.getElementById('btnNovo').addEventListener('click', () => {
    ['fNome','fEmail','fCargo','fTelefone','fSenha'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fPerfil').value = ''; document.getElementById('fEmpresa').value = '';
    modal.classList.add('open');
  });
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const nome = document.getElementById('fNome').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const perfilId = document.getElementById('fPerfil').value;
    const senha = document.getElementById('fSenha').value;

    if (!nome || !email || !perfilId){ mostrarToast('Nome, email e perfil são obrigatórios.', 'erro'); return; }
    if (!senha || senha.length < 6){ mostrarToast('Senha inicial precisa ter ao menos 6 caracteres.', 'erro'); return; }

    try {
      if (!(await checarPermissao('FUNCIONARIOS','CADASTRAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      await criarFuncionarioComLogin({
        NOME: nome, EMAIL: email, CARGO: document.getElementById('fCargo').value.trim(),
        TELEFONE: document.getElementById('fTelefone').value.trim(), PERFIL_ID: perfilId,
        EMPRESA_ID: document.getElementById('fEmpresa').value
      }, senha);
      mostrarToast('Funcionário criado com sucesso.');
      modal.classList.remove('open');
      carregar();
    } catch (e) {
      mostrarToast('Erro: ' + (e.code === 'auth/email-already-in-use' ? 'Já existe uma conta com esse email.' : e.message), 'erro');
    }
  });

  // ---------- Editar ----------
  const modalEditar = document.getElementById('modalEditar');
  window.__editar = (id) => {
    const f = itens.find(x => x.ID === id);
    if (!f) return;
    document.getElementById('eId').value = f.ID;
    document.getElementById('eNome').value = f.NOME || '';
    document.getElementById('eCargo').value = f.CARGO || '';
    document.getElementById('eTelefone').value = f.TELEFONE || '';
    document.getElementById('eStatus').value = f.STATUS || 'Ativo';
    document.getElementById('ePerfil').value = f.PERFIL_ID || '';
    document.getElementById('eEmpresa').value = f.EMPRESA_ID || '';
    modalEditar.classList.add('open');
  };
  document.getElementById('fecharModalEditar').addEventListener('click', () => modalEditar.classList.remove('open'));
  document.getElementById('btnCancelarEditar').addEventListener('click', () => modalEditar.classList.remove('open'));

  document.getElementById('btnSalvarEditar').addEventListener('click', async () => {
    const id = document.getElementById('eId').value;
    try {
      if (!(await checarPermissao('FUNCIONARIOS','EDITAR'))){ mostrarToast('Sem permissão.', 'erro'); return; }
      await dbUpdate('USUARIOS', id, {
        NOME: document.getElementById('eNome').value.trim(), CARGO: document.getElementById('eCargo').value.trim(),
        TELEFONE: document.getElementById('eTelefone').value.trim(), STATUS: document.getElementById('eStatus').value,
        PERFIL_ID: document.getElementById('ePerfil').value, EMPRESA_ID: document.getElementById('eEmpresa').value
      });
      mostrarToast('Funcionário atualizado.');
      modalEditar.classList.remove('open');
      carregar();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  carregar();
})();
</script>
