<style>
  .modal-overlay{ position:fixed; inset:0; background:rgba(3,5,8,0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:14px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; }
  .modal-head{ display:flex; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--hairline); position:sticky; top:0; background:var(--bg-surface); }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--hairline); flex-wrap:wrap; }
  .ffield{ margin-bottom:14px; }
  .ffield label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .ffield input, .ffield textarea{ width:100%; background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text-primary); padding:10px 12px; border-radius:8px; font-size:13px; font-family:inherit; }
  .ffield textarea{ min-height:160px; resize:vertical; line-height:1.5; }
  .frow2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-close{ background:none; border:none; color:var(--text-tertiary); font-size:18px; cursor:pointer; }
  .badge{ display:inline-flex; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-mono); }
  .badge.ok{ background:rgba(47,225,168,0.12); color:var(--mint); }
  .badge.neutral{ background:var(--bg-elevated); color:var(--text-secondary); }
  .badge.info{ background:rgba(76,141,255,0.12); color:var(--blue); }
</style>

<div class="toolbar"><div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Garantias</h1>
<p style="color:var(--text-secondary); font-size:13px; margin:0;">Emitidas automaticamente a cada venda com cliente vinculado. Edite o termo, gere o PDF, imprima ou baixe.</p></div></div>

<table class="dt">
  <thead><tr><th>Número</th><th>Produto</th><th>Cliente</th><th>Emitida em</th><th>Prazo</th><th>PDF</th><th></th></tr></thead>
  <tbody id="linhas"><tr class="empty-row"><td colspan="7">Carregando…</td></tr></tbody>
</table>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h3 style="font-family:var(--font-display); margin:0;" id="modalTitulo">Termo de garantia</h3><button class="modal-close" id="fecharModal">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="fId">
      <div class="frow2">
        <div class="ffield"><label>Cliente</label><input id="fClienteNome" disabled></div>
        <div class="ffield"><label>Prazo (dias)</label><input id="fPrazo" type="number"></div>
      </div>
      <div class="ffield"><label>Produto/serviço</label><input id="fProduto"></div>
      <div class="ffield"><label>Termo / condições (edite à vontade — isso é o que sai no PDF)</label><textarea id="fCondicoes"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCancelar">Fechar</button>
      <button class="btn" id="btnSalvar">Salvar alterações</button>
      <button class="btn" id="btnImprimir">🖨️ Imprimir</button>
      <button class="btn btn-primary" id="btnGerarPdf">⬇️ Salvar PDF</button>
    </div>
  </div>
</div>

<script>
(async function(){
  let itens = [], clientes = [], empresa = null;

  function dataBR(v){ return v ? new Date(v).toLocaleDateString('pt-BR') : '—'; }
  function nomeCliente(id){ const c = clientes.find(x => x.ID === id); return c ? c.NOME : '—'; }

  const TERMO_PADRAO = (garantia, nomeCli) =>
`GARANTIA Nº ${garantia.NUMERO_GARANTIA}

Cliente: ${nomeCli}
Produto/serviço: ${garantia.PRODUTO_DESCRICAO}
Data de emissão: ${dataBR(garantia.DATA_EMISSAO)}
Prazo de garantia: ${garantia.PRAZO_DIAS} dias corridos a partir da data de emissão.

CONDIÇÕES:
Esta garantia cobre exclusivamente defeitos de fabricação do produto/serviço acima descrito.
Não são cobertos por esta garantia: danos causados por mau uso, quedas, contato com líquidos,
umidade, oxidação, rompimento de lacres/selos de garantia, ou intervenção de terceiros não
autorizados por esta loja.

Para acionar a garantia, o cliente deve apresentar este termo (ou o número acima) e o produto
em nossa loja dentro do prazo informado.`;

  function renderLinhas(){
    if (!itens.length){ setHTML('linhas', '<tr class="empty-row"><td colspan="7">Nenhuma garantia emitida.</td></tr>'); return; }
    setHTML('linhas', itens.map(g => `<tr>
      <td class="mono">${g.NUMERO_GARANTIA}</td><td>${g.PRODUTO_DESCRICAO}</td><td>${nomeCliente(g.CLIENTE_ID)}</td>
      <td>${dataBR(g.DATA_EMISSAO)}</td><td>${g.PRAZO_DIAS} dias</td>
      <td>${g.PDF_GERADO ? '<span class="badge ok">Gerado</span>' : '<span class="badge neutral">Não gerado</span>'}</td>
      <td><button class="btn" style="padding:6px 10px; font-size:11.5px;" onclick="window.__abrirTermo('${g.ID}')">Abrir termo</button></td>
      </tr>`).join(''));
  }

  async function carregar(){
    try {
      if (!(await checarPermissao('GARANTIAS','VISUALIZAR'))){ setHTML('linhas', '<tr class="empty-row"><td colspan="7">Sem permissão.</td></tr>'); return; }
      clientes = await dbGetAll('CLIENTES');
      itens = await dbGetAll('GARANTIAS');
      const empresas = await dbGetAll('EMPRESAS');
      empresa = empresas[0] || { NOME: 'BStyle Eletrônicos & Acessórios', WHATSAPP: '', CIDADE: '', ESTADO: '' };
      renderLinhas();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }

  // ---------- Modal do termo ----------
  const modal = document.getElementById('modal');
  let garantiaAtual = null;

  window.__abrirTermo = (id) => {
    garantiaAtual = itens.find(g => g.ID === id);
    if (!garantiaAtual) return;
    document.getElementById('modalTitulo').textContent = 'Termo — ' + garantiaAtual.NUMERO_GARANTIA;
    document.getElementById('fId').value = garantiaAtual.ID;
    document.getElementById('fClienteNome').value = nomeCliente(garantiaAtual.CLIENTE_ID);
    document.getElementById('fProduto').value = garantiaAtual.PRODUTO_DESCRICAO || '';
    document.getElementById('fPrazo').value = garantiaAtual.PRAZO_DIAS || 90;
    document.getElementById('fCondicoes').value = garantiaAtual.TERMO_EDITADO || TERMO_PADRAO(garantiaAtual, nomeCliente(garantiaAtual.CLIENTE_ID));
    modal.classList.add('open');
  };
  document.getElementById('fecharModal').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('btnCancelar').addEventListener('click', () => modal.classList.remove('open'));

  async function salvarEdicao(){
    const dados = {
      PRODUTO_DESCRICAO: document.getElementById('fProduto').value.trim(),
      PRAZO_DIAS: Number(document.getElementById('fPrazo').value) || 90,
      TERMO_EDITADO: document.getElementById('fCondicoes').value
    };
    if (!(await checarPermissao('GARANTIAS','EDITAR'))){ mostrarToast('Sem permissão.', 'erro'); return null; }
    await dbUpdate('GARANTIAS', garantiaAtual.ID, dados);
    Object.assign(garantiaAtual, dados);
    return dados;
  }

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    try { await salvarEdicao(); mostrarToast('Termo salvo.'); carregar(); }
    catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  // ---------- Imprimir ----------
  document.getElementById('btnImprimir').addEventListener('click', async () => {
    try {
      await salvarEdicao();
      const texto = document.getElementById('fCondicoes').value;
      const janela = window.open('', '_blank');
      janela.document.write(`
        <html><head><title>${garantiaAtual.NUMERO_GARANTIA}</title>
        <style>body{font-family:Arial,sans-serif; padding:40px; white-space:pre-wrap; line-height:1.6; color:#111;} h2{margin-bottom:4px;}</style>
        </head><body>
        <h2>${empresa.NOME}</h2>
        <p style="color:#555; margin-top:0;">${empresa.CIDADE||''} ${empresa.ESTADO||''} ${empresa.WHATSAPP? '· '+empresa.WHATSAPP : ''}</p>
        <hr>
        <div>${texto.replace(/</g,'&lt;')}</div>
        </body></html>
      `);
      janela.document.close();
      janela.focus();
      setTimeout(() => janela.print(), 400);
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  });

  // ---------- Salvar PDF ----------
  document.getElementById('btnGerarPdf').addEventListener('click', async () => {
    try {
      const dados = await salvarEdicao();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      doc.setFontSize(16); doc.setFont(undefined, 'bold');
      doc.text(empresa.NOME || 'Loja', 20, 22);
      doc.setFontSize(10); doc.setFont(undefined, 'normal');
      doc.text([empresa.CIDADE||'', empresa.ESTADO||'', empresa.WHATSAPP||''].filter(Boolean).join(' · '), 20, 29);
      doc.setLineWidth(0.3); doc.line(20, 33, 190, 33);

      doc.setFontSize(13); doc.setFont(undefined, 'bold');
      doc.text('TERMO DE GARANTIA', 20, 42);

      doc.setFontSize(10.5); doc.setFont(undefined, 'normal');
      const texto = document.getElementById('fCondicoes').value;
      const linhas = doc.splitTextToSize(texto, 170);
      doc.text(linhas, 20, 52);

      const yAssinatura = 52 + linhas.length * 5.2 + 20;
      doc.line(20, yAssinatura, 90, yAssinatura);
      doc.text('Assinatura da loja', 20, yAssinatura + 5);
      doc.line(120, yAssinatura, 190, yAssinatura);
      doc.text('Assinatura do cliente', 120, yAssinatura + 5);

      doc.save('Garantia_' + garantiaAtual.NUMERO_GARANTIA + '.pdf');

      if (!(await checarPermissao('GARANTIAS','EDITAR'))){ mostrarToast('Sem permissão pra marcar como gerado.', 'erro'); return; }
      await dbUpdate('GARANTIAS', garantiaAtual.ID, { PDF_GERADO: true, DATA_GERACAO_PDF: new Date().toISOString() });
      mostrarToast('PDF salvo no seu computador.');
      modal.classList.remove('open');
      carregar();
    } catch (e) { mostrarToast('Erro ao gerar PDF: ' + e.message, 'erro'); }
  });

  carregar();
})();
</script>
