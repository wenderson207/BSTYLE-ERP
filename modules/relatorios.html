<style>
  .rel-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
  .rel-card{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:12px; padding:16px; cursor:pointer; text-align:center; }
  .rel-card:hover{ border-color:var(--mint); }
  .rel-card.active{ border-color:var(--mint); background:var(--bg-elevated); }
  .rel-card h4{ font-family:var(--font-display); font-size:13px; margin:0; }
  .rel-resumo{ display:flex; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
  .rel-resumo .item .lbl{ font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono); text-transform:uppercase; }
  .rel-resumo .item .val{ font-family:var(--font-display); font-size:18px; font-weight:600; }
  .rel-filtros{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .rel-filtros select, .rel-filtros input{ background:var(--bg-surface); border:1px solid var(--hairline); color:var(--text-primary); padding:8px 12px; border-radius:8px; font-size:12.5px; }
  .rel-filtros label{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-secondary); cursor:pointer; }
  table.dt th{ cursor:pointer; user-select:none; white-space:nowrap; }
  table.dt th:hover{ color:var(--text-primary); }
  table.dt th .seta{ font-size:9px; margin-left:3px; color:var(--mint); }
</style>

<div class="toolbar"><div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Relatórios</h1>
<p style="color:var(--text-secondary); font-size:13px; margin:0;">Clique numa coluna pra ordenar por ela.</p></div></div>

<div class="rel-grid" id="relGrid"></div>

<div id="relResult" style="display:none;">
  <div class="rel-filtros" id="relFiltros"></div>
  <div class="toolbar">
    <div class="rel-resumo" id="relResumo"></div>
    <div style="display:flex; gap:8px;">
      <button class="btn" id="btnExportCsv">⬇️ CSV</button>
      <button class="btn" id="btnExportPdf">⬇️ PDF</button>
    </div>
  </div>
  <table class="dt"><thead id="relThead"></thead><tbody id="relTbody"></tbody></table>
</div>

<script>
(async function(){
  if (!(await checarPermissao('RELATORIOS','VISUALIZAR'))){ setHTML('relGrid', 'Sem permissão.'); return; }

  const [clientes, usuarios, produtosGlobal] = await Promise.all([dbGetAll('CLIENTES'), dbGetAll('USUARIOS'), dbGetAll('PRODUTOS')]);
  function nomeCliente(id){ const c = clientes.find(x=>x.ID===id); return c?c.NOME:'—'; }
  function nomeUsuario(id){ const u = usuarios.find(x=>x.ID===id); return u?u.NOME:(id||'—'); }
  function moeda(v){ return (Number(v)||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
  function dataHoraBR(v){ return v ? new Date(v).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—'; }
  function dataBR(v){ return v ? new Date(v).toLocaleDateString('pt-BR') : '—'; }

  const RELATORIOS = [
    { id:'vendas', nome:'Vendas', colecao:'VENDAS',
      colunas: ['Data/Hora','Cliente','Vendedor','Pagamento','Valor','Status'],
      linha: v => [dataHoraBR(v.DATA), nomeCliente(v.CLIENTE_ID) || 'Sem cliente', nomeUsuario(v.USUARIO_ID), v.FORMA_PAGAMENTO + (v.PARCELAS>1?' ('+v.PARCELAS+'x)':''), moeda(v.VALOR_TOTAL), v.STATUS],
      resumo: lista => [ ['Total de vendas', lista.length], ['Valor total', moeda(lista.reduce((s,v)=>s+Number(v.VALOR_TOTAL||0),0))] ]
    },
    { id:'clientes', nome:'Clientes', colecao:'CLIENTES',
      colunas: ['Nome','CPF','Telefone','Valor gasto','Última compra'],
      linha: c => [c.NOME, c.CPF||'—', c.TELEFONE||'—', moeda(c.VALOR_GASTO_TOTAL), dataBR(c.DATA_ULTIMA_COMPRA)],
      resumo: lista => [ ['Total de clientes', lista.length] ]
    },
    { id:'produtos', nome:'Produtos', colecao:'PRODUTOS',
      colunas: ['Nome','SKU','Categoria','Custo','Venda','Estoque'],
      linha: p => [p.NOME, p.SKU||'—', p.CATEGORIA||'Geral', moeda(p.PRECO_CUSTO), moeda(p.PRECO_VENDA), p.ESTOQUE_ATUAL],
      resumo: lista => [ ['Total de produtos', lista.length], ['Estoque baixo', lista.filter(p=>Number(p.ESTOQUE_ATUAL)<=Number(p.ESTOQUE_MINIMO)).length] ],
      filtros: true
    },
    { id:'garantias', nome:'Garantias', colecao:'GARANTIAS',
      colunas: ['Número','Produto','Cliente','Emitida em','Prazo','Status'],
      linha: g => [g.NUMERO_GARANTIA, g.PRODUTO_DESCRICAO, nomeCliente(g.CLIENTE_ID), dataBR(g.DATA_EMISSAO), g.PRAZO_DIAS+' dias', g.STATUS],
      resumo: lista => [ ['Total emitidas', lista.length] ]
    },
    { id:'assistencias', nome:'Assistências', colecao:'ASSISTENCIAS',
      colunas: ['Nº OS','Cliente','Marca/Modelo','Status','Entrega prevista'],
      linha: o => [o.NUMERO_OS, nomeCliente(o.CLIENTE_ID), (o.MARCA||'')+' '+(o.MODELO||''), o.STATUS, dataBR(o.PRAZO)],
      resumo: lista => [ ['Total de OS', lista.length], ['Em aberto', lista.filter(o=>o.STATUS!=='Entregue').length] ]
    },
    { id:'financeiro', nome:'Financeiro', colecao:'FINANCEIRO',
      colunas: ['Descrição','Categoria','Tipo','Valor','Vencimento','Status'],
      linha: f => [f.DESCRICAO||'—', f.CATEGORIA||'—', f.TIPO, moeda(f.VALOR), dataBR(f.DATA_VENCIMENTO), f.STATUS],
      resumo: lista => [
        ['Receitas', moeda(lista.filter(f=>f.TIPO==='Receita' && f.STATUS==='Pago').reduce((s,f)=>s+Number(f.VALOR||0),0))],
        ['Despesas', moeda(lista.filter(f=>f.TIPO==='Despesa' && f.STATUS==='Pago').reduce((s,f)=>s+Number(f.VALOR||0),0))]
      ]
    },
    { id:'compras', nome:'Compras', colecao:'COMPRAS',
      colunas: ['Data','Valor total','Status'],
      linha: c => [dataBR(c.DATA), moeda(c.VALOR_TOTAL), c.STATUS],
      resumo: lista => [ ['Total de compras', lista.length], ['Valor total', moeda(lista.reduce((s,c)=>s+Number(c.VALOR_TOTAL||0),0))] ]
    }
  ];

  let relAtivo = null, dadosCompletos = [], dadosFiltrados = [];
  let ordenacao = { coluna: -1, asc: true };

  setHTML('relGrid', RELATORIOS.map(r => `<div class="rel-card" data-id="${r.id}"><h4>${r.nome}</h4></div>`).join(''));

  document.querySelectorAll('.rel-card').forEach(card => card.addEventListener('click', async () => {
    document.querySelectorAll('.rel-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    relAtivo = RELATORIOS.find(r => r.id === card.dataset.id);
    ordenacao = { coluna: -1, asc: true };
    document.getElementById('relResult').style.display = 'block';
    setHTML('relTbody', '<tr class="empty-row"><td colspan="10">Carregando…</td></tr>');
    try {
      dadosCompletos = await dbGetAll(relAtivo.colecao);
      renderFiltros();
      aplicarFiltros();
    } catch (e) { mostrarToast('Erro: ' + e.message, 'erro'); }
  }));

  // ---------- Filtros (só aparecem quando fazem sentido — hoje, Produtos) ----------
  function renderFiltros(){
    if (!relAtivo.filtros) { setHTML('relFiltros', ''); return; }

    const categorias = [...new Set(dadosCompletos.map(p => p.CATEGORIA || 'Geral'))];
    setHTML('relFiltros', `
      <select id="filtroCategoriaRel"><option value="">Todas as categorias</option>${categorias.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <label><input type="checkbox" id="filtroEstoqueBaixoRel"> Só estoque baixo</label>
      <input id="filtroPrecoMinRel" type="number" step="0.01" placeholder="Preço mín. (R$)" style="width:140px;">
      <input id="filtroPrecoMaxRel" type="number" step="0.01" placeholder="Preço máx. (R$)" style="width:140px;">
    `);
    ['filtroCategoriaRel','filtroEstoqueBaixoRel','filtroPrecoMinRel','filtroPrecoMaxRel'].forEach(id => {
      document.getElementById(id).addEventListener('input', aplicarFiltros);
      document.getElementById(id).addEventListener('change', aplicarFiltros);
    });
  }

  function aplicarFiltros(){
    let lista = dadosCompletos.slice();

    if (relAtivo.filtros) {
      const categoria = document.getElementById('filtroCategoriaRel')?.value;
      const soBaixo = document.getElementById('filtroEstoqueBaixoRel')?.checked;
      const precoMin = Number(document.getElementById('filtroPrecoMinRel')?.value) || null;
      const precoMax = Number(document.getElementById('filtroPrecoMaxRel')?.value) || null;

      lista = lista.filter(p => {
        if (categoria && (p.CATEGORIA||'Geral') !== categoria) return false;
        if (soBaixo && !(Number(p.ESTOQUE_ATUAL) <= Number(p.ESTOQUE_MINIMO))) return false;
        if (precoMin !== null && Number(p.PRECO_VENDA) < precoMin) return false;
        if (precoMax !== null && Number(p.PRECO_VENDA) > precoMax) return false;
        return true;
      });
    }

    dadosFiltrados = lista;
    renderTabela();
  }

  // ---------- Ordenação genérica por coluna (detecta moeda/data/número/texto) ----------
  function valorOrdenavel(texto){
    if (texto == null) return '';
    const t = String(texto).trim();
    const comoMoeda = t.replace(/[R$\s.]/g,'').replace(',', '.');
    if (/^-?\d+(\.\d+)?$/.test(comoMoeda) && /R\$/.test(t)) return parseFloat(comoMoeda);
    const dataMatch = t.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (dataMatch) return new Date(dataMatch[3], dataMatch[2]-1, dataMatch[1]).getTime();
    if (/^-?\d+(\.\d+)?$/.test(t)) return parseFloat(t);
    return t.toLowerCase();
  }

  function ordenarLinhas(linhas){
    if (ordenacao.coluna < 0) return linhas;
    const idx = ordenacao.coluna;
    return linhas.slice().sort((a,b) => {
      const va = valorOrdenavel(a[idx]), vb = valorOrdenavel(b[idx]);
      if (va < vb) return ordenacao.asc ? -1 : 1;
      if (va > vb) return ordenacao.asc ? 1 : -1;
      return 0;
    });
  }

  function renderTabela(){
    const linhasRenderizadas = dadosFiltrados.map(item => relAtivo.linha(item));
    const linhasOrdenadas = ordenarLinhas(linhasRenderizadas);

    setHTML('relThead', '<tr>' + relAtivo.colunas.map((c,i) => {
      const seta = ordenacao.coluna === i ? `<span class="seta">${ordenacao.asc?'▲':'▼'}</span>` : '';
      return `<th onclick="window.__ordenarRelatorio(${i})">${c}${seta}</th>`;
    }).join('') + '</tr>');

    setHTML('relTbody', linhasOrdenadas.length
      ? linhasOrdenadas.map(linha => '<tr>' + linha.map(v => `<td>${v}</td>`).join('') + '</tr>').join('')
      : `<tr class="empty-row"><td colspan="${relAtivo.colunas.length}">Nenhum registro encontrado.</td></tr>`);

    setHTML('relResumo', relAtivo.resumo(dadosFiltrados).map(([lbl,val]) => `<div class="item"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`).join(''));
  }

  window.__ordenarRelatorio = (indiceColuna) => {
    if (ordenacao.coluna === indiceColuna) ordenacao.asc = !ordenacao.asc;
    else ordenacao = { coluna: indiceColuna, asc: true };
    renderTabela();
  };

  document.getElementById('btnExportCsv').addEventListener('click', () => {
    if (!relAtivo || !dadosFiltrados.length){ mostrarToast('Nada pra exportar.', 'erro'); return; }
    const linhas = [relAtivo.colunas.join(';')].concat(ordenarLinhas(dadosFiltrados.map(item => relAtivo.linha(item))).map(linha => linha.map(v => String(v).replace(/;/g,',')).join(';')));
    const blob = new Blob(['\uFEFF' + linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = relAtivo.nome + '.csv'; a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('btnExportPdf').addEventListener('click', () => {
    if (!relAtivo || !dadosFiltrados.length){ mostrarToast('Nada pra exportar.', 'erro'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    doc.setFontSize(14); doc.text('Relatório de ' + relAtivo.nome, 14, 15);
    doc.setFontSize(9);
    let y = 25;
    const larguraColuna = 270 / relAtivo.colunas.length;
    relAtivo.colunas.forEach((c,i) => doc.text(String(c), 14 + i*larguraColuna, y));
    y += 6;
    ordenarLinhas(dadosFiltrados.map(item => relAtivo.linha(item))).forEach(linha => {
      linha.forEach((v,i) => doc.text(String(v).substring(0,22), 14 + i*larguraColuna, y));
      y += 6;
      if (y > 195) { doc.addPage(); y = 20; }
    });
    doc.save('Relatorio_' + relAtivo.nome + '.pdf');
  });

  document.querySelector('.rel-card').click();
})();
</script>
