<style>
  .rel-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
  .rel-card{ background:var(--bg-surface); border:1px solid var(--hairline); border-radius:12px; padding:18px; cursor:pointer; }
  .rel-card:hover{ border-color:var(--mint); }
  .rel-card.active{ border-color:var(--mint); background:var(--bg-elevated); }
  pre{ background:var(--bg-elevated); border-radius:8px; padding:14px; font-family:var(--font-mono); font-size:11.5px; color:var(--text-secondary); overflow-x:auto; max-height:400px; }
</style>

<div class="toolbar"><div><h1 style="font-family:var(--font-display); font-size:22px; margin:0 0 4px;">Relatórios</h1>
<p style="color:var(--text-secondary); font-size:13px; margin:0;">Exportação em Excel/PDF ainda não migrada (dependia do Apps Script) — por enquanto, os dados aparecem aqui na tela.</p></div></div>

<div class="rel-grid" id="relGrid"></div>
<div class="card" id="relResult" style="display:none;"><pre id="relJson">—</pre></div>

<script>
(async function(){
  const RELATORIOS = [
    { id:'vendas', nome:'Vendas', colecao:'VENDAS' },
    { id:'clientes', nome:'Clientes', colecao:'CLIENTES' },
    { id:'produtos', nome:'Produtos', colecao:'PRODUTOS' },
    { id:'garantias', nome:'Garantias', colecao:'GARANTIAS' },
    { id:'assistencias', nome:'Assistências', colecao:'ASSISTENCIAS' },
    { id:'financeiro', nome:'Financeiro', colecao:'FINANCEIRO' },
    { id:'compras', nome:'Compras', colecao:'COMPRAS' }
  ];

  if (!(await checarPermissao('RELATORIOS','VISUALIZAR'))){ document.getElementById('relGrid').innerHTML = 'Sem permissão.'; return; }

  const grid = document.getElementById('relGrid');
  grid.innerHTML = RELATORIOS.map(r => `<div class="rel-card" data-id="${r.id}"><h4 style="font-family:var(--font-display); margin:0;">${r.nome}</h4></div>`).join('');

  grid.querySelectorAll('.rel-card').forEach(card => card.addEventListener('click', async () => {
    grid.querySelectorAll('.rel-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    const rel = RELATORIOS.find(r => r.id === card.dataset.id);
    document.getElementById('relResult').style.display = 'block';
    document.getElementById('relJson').textContent = 'Carregando…';
    try {
      const dados = await dbGetAll(rel.colecao);
      document.getElementById('relJson').textContent = JSON.stringify(dados, null, 2);
    } catch (e) {
      document.getElementById('relJson').textContent = 'Erro: ' + e.message;
    }
  }));

  grid.querySelector('.rel-card').click();
})();
</script>
